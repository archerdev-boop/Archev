<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Archers Arrow: defend your keep from waves of raiders. Draw your bow, aim, and release arrows to stop enemies before they reach the gate.">
<meta name="theme-color" content="#1b1033">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%231b1033'/%3E%3Cpath d='M14 50 L50 14' stroke='%23ffc24d' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M50 14 L38 14 M50 14 L50 26' stroke='%23ffc24d' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Archers Arrow</title>
<style>
  :root{
    --sky-top:#1b1033;
    --sky-mid:#5a2a4a;
    --sky-low:#e8643a;
    --sun-core:#ffd56b;
    --hill-far:#3a2042;
    --hill-mid:#5c2a3e;
    --hill-near:#2a1420;
    --parchment:#fdeacb;
    --parchment-dim:#e8b873;
    --wood:#5c3b22;
    --wood-dark:#3a2414;
    --blood:#a8334a;
    --blood-bright:#ff5a5a;
    --gold:#ffc24d;
    --ember:#ff7a3a;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    font-family: Georgia, 'Times New Roman', serif;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  #wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  canvas{
    display:block;
    touch-action:none;
    cursor:crosshair;
  }

  /* ---------- HUD ---------- */
  .hud{
    position:absolute; inset:0;
    pointer-events:none;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .hud-top{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: max(10px, env(safe-area-inset-top)) 14px 0 14px;
  }
  .stat-box{
    background:linear-gradient(180deg, rgba(40,18,24,.85), rgba(18,9,14,.85));
    border:1px solid rgba(255,194,77,0.4);
    border-radius:6px;
    padding:6px 12px;
    color:var(--parchment);
    box-shadow:0 2px 10px rgba(0,0,0,.5), 0 0 14px rgba(255,122,58,.12), inset 0 1px 0 rgba(255,255,255,.05);
    backdrop-filter: blur(2px);
  }
  .stat-label{
    font-size:9px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--parchment-dim);
    opacity:.8;
  }
  .stat-value{
    font-size:20px;
    font-weight:700;
    color:var(--gold);
    font-variant-numeric: tabular-nums;
    letter-spacing:1px;
  }
  .hearts{
    display:flex; gap:4px; margin-top:2px;
  }
  .heart{
    width:14px; height:14px;
    background:var(--blood-bright);
    clip-path: path('M7 13 C7 13 0 8 0 4 C0 1.5 2 0 4 0 C5.5 0 6.5 1 7 2 C7.5 1 8.5 0 10 0 C12 0 14 1.5 14 4 C14 8 7 13 7 13 Z');
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.6));
    transition: opacity .25s, transform .25s;
  }
  .heart.lost{ opacity:.15; transform:scale(.8); }

  .wave-banner{
    position:absolute; top:14%; left:50%;
    transform: translate(-50%,-20px);
    text-align:center;
    color:var(--parchment);
    opacity:0;
    transition: opacity .4s, transform .4s;
    pointer-events:none;
  }
  .wave-banner.show{ opacity:1; transform: translate(-50%,0); }
  .wave-banner .big{
    font-size:38px; font-weight:700; letter-spacing:3px;
    color:var(--gold);
    text-shadow:0 2px 12px rgba(0,0,0,.8), 0 0 36px rgba(255,124,58,.55);
  }
  .wave-banner .small{
    font-size:13px; letter-spacing:4px; text-transform:uppercase;
    color:var(--parchment-dim);
    margin-top:2px;
  }

  .combo-pop{
    position:absolute;
    font-size:15px; font-weight:700;
    color:var(--ember);
    text-shadow:0 1px 4px rgba(0,0,0,.7);
    pointer-events:none;
    transform: translate(-50%,-50%);
    animation: popFade .7s ease-out forwards;
  }
  @keyframes popFade{
    0%{ opacity:1; transform: translate(-50%,-50%) scale(.8); }
    30%{ transform: translate(-50%,-65%) scale(1.15); }
    100%{ opacity:0; transform: translate(-50%,-110%) scale(1); }
  }

  .power-bar-wrap{
    position:absolute; left:50%; bottom: max(18px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(220px, 50vw);
    height:8px;
    background:rgba(0,0,0,.5);
    border:1px solid rgba(255,194,77,.3);
    border-radius:5px;
    overflow:hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.6);
  }
  .power-bar-fill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--blood), var(--ember), var(--gold));
    border-radius:5px;
    transition: width .03s linear;
  }

  /* ---------- Combo meter ---------- */
  .combo-meter{
    position:absolute; top:18%; left:50%;
    transform: translate(-50%,0) scale(0.8);
    text-align:center;
    pointer-events:none;
    opacity:0;
    transition: opacity .2s, transform .2s;
  }
  .combo-meter.show{ opacity:1; transform: translate(-50%,0) scale(1); }
  .combo-meter.pop{ animation: comboPop .25s ease-out; }
  @keyframes comboPop{
    0%{ transform: translate(-50%,0) scale(1.35); }
    100%{ transform: translate(-50%,0) scale(1); }
  }
  .combo-num{
    font-size:26px; font-weight:700;
    color:var(--ember);
    text-shadow:0 2px 8px rgba(0,0,0,.7), 0 0 22px rgba(255,122,58,.6);
  }
  .combo-bar-wrap{
    width:90px; height:5px; margin:2px auto 0;
    background:rgba(0,0,0,.5);
    border-radius:3px;
    overflow:hidden;
  }
  .combo-bar-fill{
    height:100%; width:100%;
    background:linear-gradient(90deg, var(--gold), var(--ember));
    transition: width .05s linear;
  }

  /* ---------- Achievement toasts ---------- */
  .ach-toast-wrap{
    position:absolute; top:max(64px, env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%);
    display:flex; flex-direction:column; gap:8px;
    pointer-events:none;
    z-index:30;
    width:min(320px, 86vw);
  }
  .ach-toast{
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(180deg, rgba(40,24,14,.95), rgba(18,11,7,.95));
    border:1px solid rgba(255,194,77,.55);
    border-radius:8px;
    padding:9px 14px;
    box-shadow:0 4px 16px rgba(0,0,0,.5), 0 0 20px rgba(255,194,77,.25);
    color:var(--parchment);
    animation: achIn .35s ease-out, achOut .4s ease-in forwards 2.6s;
  }
  @keyframes achIn{ 0%{ opacity:0; transform:translateY(-14px) scale(.92); } 100%{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes achOut{ 0%{ opacity:1; } 100%{ opacity:0; transform:translateY(-10px); } }
  .ach-toast .ach-icon{ font-size:22px; line-height:1; }
  .ach-toast .ach-text{ text-align:left; }
  .ach-toast .ach-title{ font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
  .ach-toast .ach-name{ font-size:13px; font-weight:700; }

  /* ---------- Slow-mo headshot banner ---------- */
  .slowmo-banner{
    position:absolute; top:50%; left:50%;
    transform: translate(-50%,-50%) scale(.6);
    font-size: clamp(26px, 7vw, 46px);
    font-weight:700; letter-spacing:5px;
    color:#fff3c4;
    text-shadow:0 0 18px rgba(255,211,77,.9), 0 0 50px rgba(255,122,58,.6), 0 3px 6px rgba(0,0,0,.8);
    opacity:0;
    pointer-events:none;
    z-index:15;
  }
  .slowmo-banner.show{
    animation: slowmoPop .55s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes slowmoPop{
    0%{ opacity:0; transform: translate(-50%,-50%) scale(.5); }
    25%{ opacity:1; transform: translate(-50%,-50%) scale(1.12); }
    75%{ opacity:1; transform: translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform: translate(-50%,-50%) scale(1.04); }
  }

  /* ---------- Menu rows / extra buttons ---------- */
  .menu-row{
    display:flex; gap:10px; margin-top:14px;
  }
  .menu-row .btn.secondary{ margin-top:0; font-size:11px; padding:8px 14px; }
  .daily-btn{ margin-top:10px; position:relative; }
  .dot{
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--blood-bright);
    box-shadow:0 0 8px rgba(255,90,90,.8);
    margin-left:4px; vertical-align:middle;
  }
  .dot.hidden{ display:none; }

  /* ---------- Leaderboard ---------- */
  .lb-list{
    width:min(320px, 86vw);
    margin-bottom:20px;
    display:flex; flex-direction:column; gap:6px;
    max-height:46vh; overflow-y:auto;
  }
  .lb-row{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,194,77,.18);
    border-radius:6px;
    padding:8px 12px;
    font-size:13px;
  }
  .lb-row.me{ border-color:rgba(255,194,77,.6); background:rgba(255,194,77,.08); }
  .lb-rank{ width:22px; font-weight:700; color:var(--gold); }
  .lb-name{ font-weight:700; color:var(--gold); font-size:13px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lb-info{ text-align:left; }
  .lb-score{ font-weight:700; color:var(--parchment); font-variant-numeric:tabular-nums; }
  .lb-meta{ font-size:10px; color:var(--parchment-dim); letter-spacing:1px; text-transform:uppercase; }
  .lb-empty{ font-size:13px; color:var(--parchment-dim); padding:20px 0; }

  /* ---------- Name input ---------- */
  .name-row{
    display:flex; gap:8px; align-items:center; margin-bottom:14px;
    width:min(320px,86vw);
  }
  .name-input{
    flex:1;
    font-family:Georgia,serif;
    font-size:14px;
    background:rgba(30,14,20,.85);
    border:1px solid rgba(255,194,77,.5);
    border-radius:6px;
    padding:8px 12px;
    color:var(--parchment);
    outline:none;
    pointer-events:auto;
  }
  .name-input::placeholder{ color:var(--parchment-dim); opacity:.55; }
  .name-input:focus{ border-color:var(--gold); box-shadow:0 0 10px rgba(255,194,77,.25); }
  .name-save-btn{
    pointer-events:auto;
    font-family:Georgia,serif;
    font-size:12px; font-weight:700; letter-spacing:1px;
    color:var(--parchment);
    background:linear-gradient(180deg,#8a4a2e,var(--wood-dark));
    border:1px solid rgba(255,194,77,.5);
    border-radius:6px;
    padding:8px 14px;
    cursor:pointer;
    white-space:nowrap;
  }

  /* ---------- Achievements list ---------- */
  .ach-list{
    width:min(360px, 88vw);
    margin-bottom:20px;
    display:flex; flex-direction:column; gap:8px;
    max-height:50vh; overflow-y:auto;
  }
  .ach-card{
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,194,77,.18);
    border-radius:8px;
    padding:10px 14px;
    text-align:left;
    opacity:.5;
  }
  .ach-card.unlocked{ opacity:1; border-color:rgba(255,194,77,.5); background:rgba(255,194,77,.07); }
  .ach-card .ach-card-icon{ font-size:24px; width:30px; text-align:center; }
  .ach-card .ach-card-name{ font-size:13px; font-weight:700; color:var(--parchment); }
  .ach-card .ach-card-desc{ font-size:11px; color:var(--parchment-dim); margin-top:1px; }

  /* ---------- Daily reward ---------- */
  .daily-row{
    display:flex; gap:8px; margin:14px 0 18px;
  }
  .daily-day{
    width:42px; height:52px;
    border-radius:7px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,194,77,.25);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:10px;
    color:var(--parchment-dim);
  }
  .daily-day .dn{ font-size:9px; letter-spacing:1px; text-transform:uppercase; }
  .daily-day .dv{ font-size:13px; font-weight:700; color:var(--gold); margin-top:2px; }
  .daily-day.done{ border-color:rgba(255,194,77,.6); background:rgba(255,194,77,.12); }
  .daily-day.today{ border-color:var(--gold); box-shadow:0 0 14px rgba(255,194,77,.4); transform:scale(1.06); }
  .daily-amount{
    font-size:30px; font-weight:700; color:var(--gold);
    text-shadow:0 0 20px rgba(255,194,77,.4);
    margin-bottom:8px;
  }

  /* ---------- Screens ---------- */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 28%, rgba(232,100,58,.35), rgba(30,14,30,.93) 68%);
    color:var(--parchment);
    text-align:center;
    padding:24px;
    z-index:20;
  }
  .screen.hidden{ display:none; }
  .title{
    font-size: clamp(42px, 11vw, 74px);
    font-weight:700;
    letter-spacing:6px;
    color:var(--gold);
    text-shadow: 0 3px 0 rgba(0,0,0,.5), 0 0 24px rgba(255,124,58,.65), 0 0 60px rgba(255,194,77,.35);
    margin-bottom:4px;
  }
  .subtitle{
    font-size: clamp(12px, 2.6vw, 15px);
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--parchment-dim);
    margin-bottom:36px;
    opacity:.85;
  }
  .credit-link{
    pointer-events:auto;
    display:inline-block;
    font-size:11px;
    letter-spacing:1px;
    color:var(--parchment-dim);
    text-decoration:none;
    opacity:.7;
    margin:2px 0 14px;
    border-bottom:1px solid rgba(255,194,77,.25);
    transition: opacity .15s, color .15s;
  }
  .credit-link:hover, .credit-link:active{
    opacity:1;
    color:var(--gold);
  }
  .coin-display{
    font-size:14px; font-weight:700;
    color:var(--gold);
    background:rgba(0,0,0,.3);
    border:1px solid rgba(255,194,77,.3);
    border-radius:20px;
    padding:5px 16px;
    margin:-22px 0 22px;
    display:inline-block;
  }
  .btn{
    pointer-events:auto;
    font-family:Georgia, serif;
    font-size:18px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color:var(--parchment);
    background:linear-gradient(180deg, #8a4a2e, var(--wood-dark));
    border:1px solid rgba(255,194,77,.55);
    border-radius:8px;
    padding:14px 42px;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.4), 0 8px 22px rgba(255,122,58,.25), inset 0 1px 0 rgba(255,255,255,.1);
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active{
    transform: translateY(3px);
    box-shadow:0 1px 0 rgba(0,0,0,.4), 0 3px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .btn.secondary{
    background:transparent;
    border:1px solid rgba(232,213,168,.3);
    color:var(--parchment-dim);
    font-size:13px;
    padding:9px 22px;
    box-shadow:none;
    margin-top:14px;
  }
  .btn.secondary:active{ transform: translateY(1px); }
  .btn:disabled{
    opacity:.4; cursor:default; pointer-events:none;
  }

  .howto{
    max-width:340px;
    font-size:13px;
    line-height:1.7;
    color:var(--parchment-dim);
    margin-top:22px;
    border-top:1px solid rgba(255,194,77,.2);
    padding-top:16px;
  }
  .howto b{ color:var(--gold); }

  .final-stats{
    display:flex; gap:28px;
    margin: 18px 0 30px;
  }
  .final-stat .num{
    font-size:34px; font-weight:700; color:var(--gold);
    font-variant-numeric: tabular-nums;
  }
  .final-stat .lbl{
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--parchment-dim);
  }
  .best-tag{
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:var(--ember);
    margin-top:-10px; margin-bottom:18px;
    height:14px;
  }

  #pauseBtn{
    position:absolute; top:max(10px,env(safe-area-inset-top)); right:14px;
    pointer-events:auto;
    width:38px; height:38px;
    background:rgba(20,16,10,.7);
    border:1px solid rgba(255,194,77,.35);
    border-radius:6px;
    color:var(--parchment-dim);
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .hud-top .stat-box.left-stack{ display:flex; flex-direction:column; gap:6px; }

  @media (max-width:480px){
    .stat-value{ font-size:17px; }
    .title{ letter-spacing:3px; }
  }

  .sr-only{ position:absolute; width:1px;height:1px; overflow:hidden; opacity:0; }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="game"></canvas>

  <div class="hud" id="hud">
    <div class="hud-top">
      <div class="stat-box left-stack">
        <div>
          <div class="stat-label">Score</div>
          <div class="stat-value" id="scoreVal">0</div>
        </div>
        <div class="hearts" id="hearts"></div>
      </div>
      <div class="stat-box" style="text-align:right;">
        <div class="stat-label">Wave</div>
        <div class="stat-value" id="waveVal">1</div>
      </div>
    </div>

    <div class="wave-banner" id="waveBanner">
      <div class="big" id="waveBannerBig">WAVE 1</div>
      <div class="small">draw the bow &amp; release</div>
    </div>

    <div class="combo-meter" id="comboMeter">
      <div class="combo-num"><span id="comboVal">0</span>x</div>
      <div class="combo-bar-wrap"><div class="combo-bar-fill" id="comboBarFill"></div></div>
    </div>

    <div class="power-bar-wrap"><div class="power-bar-fill" id="powerFill"></div></div>

    <button id="pauseBtn" aria-label="Pause">❙❙</button>
  </div>

  <!-- Achievement toast container -->
  <div class="ach-toast-wrap" id="achToastWrap"></div>

  <!-- Slow-mo headshot banner -->
  <div class="slowmo-banner" id="slowmoBanner">HEADSHOT</div>

  <!-- Start screen -->
  <div class="screen" id="startScreen">
    <div class="title">ARCHERS ARROW</div>
    <div class="subtitle">defend the keep</div>
    <button class="btn" id="startBtn">Begin</button>
    <div style="margin-top:18px; display:flex; flex-direction:column; align-items:center; gap:10px;">
      <a href="https://orynth.dev/projects/archers-arrow-8449" target="_blank" rel="noopener">
        <img src="https://orynth.dev/api/badge/archers-arrow-8449?theme=light&style=default" alt="Featured on Orynth" width="260" height="80" />
      </a>
      <a href="https://x.com/zhurn_kirov" target="_blank" rel="noopener" style="color:var(--parchment-dim); font-size:12px; letter-spacing:1px; text-decoration:none;">@zhurn_kirov</a>
    </div>
  </div>

  <!-- Pause screen -->
  <div class="screen hidden" id="pauseScreen">
    <div class="title" style="font-size:38px;">PAUSED</div>
    <button class="btn" id="resumeBtn">Resume</button>
    <button class="btn secondary" id="quitBtn">Quit to menu</button>
  </div>

  <!-- Game over screen -->
  <div class="screen hidden" id="overScreen">
    <div class="title" style="font-size:40px;">THE GATE HAS FALLEN</div>
    <div class="final-stats">
      <div class="final-stat"><div class="num" id="finalScore">0</div><div class="lbl">Score</div></div>
      <div class="final-stat"><div class="num" id="finalWave">1</div><div class="lbl">Wave Reached</div></div>
      <div class="final-stat"><div class="num" id="finalCombo">0</div><div class="lbl">Best Combo</div></div>
    </div>
    <div class="best-tag" id="bestTag"></div>
    <div class="name-row">
      <input class="name-input" id="nameInput" type="text" maxlength="16" placeholder="Enter your name…" autocomplete="off" spellcheck="false">
      <button class="name-save-btn" id="nameSaveBtn">Save</button>
    </div>
    <button class="btn" id="retryBtn">Defend Again</button>
    <button class="btn secondary" id="overLeaderboardBtn">View Leaderboard</button>
  </div>

  <!-- Leaderboard screen -->
  <div class="screen hidden" id="leaderboardScreen">
    <div class="title" style="font-size:34px;">LEADERBOARD</div>
    <div class="subtitle" style="margin-bottom:18px;">top defenders</div>
    <div class="lb-list" id="lbList"></div>
    <button class="btn secondary" id="lbBackBtn">Back</button>
  </div>

  <!-- Achievements screen -->
  <div class="screen hidden" id="achievementsScreen">
    <div class="title" style="font-size:34px;">ACHIEVEMENTS</div>
    <div class="subtitle" style="margin-bottom:8px;"><span id="achProgress">0/0</span> unlocked</div>
    <div class="ach-list" id="achList"></div>
    <button class="btn secondary" id="achBackBtn">Back</button>
  </div>

  <!-- Daily reward modal -->
  <div class="screen hidden" id="dailyScreen">
    <div class="title" style="font-size:32px;">DAILY REWARD</div>
    <div class="subtitle" id="dailyStreakLabel">day 1 streak</div>
    <div class="daily-row" id="dailyRow"></div>
    <div class="daily-amount" id="dailyAmount">+50</div>
    <button class="btn" id="dailyClaimBtn">Claim</button>

/* ============================================================
   DAILY REWARDS

var DAILY_KEY = 'archers_arrow_daily';
var DAILY_REWARDS = [50, 75, 100, 150, 200, 300, 500]; // day 1..7, then loops
function getDailyState(){
  var st = { lastClaim: 0, streak: 0 };
  try{ st = JSON.parse(localStorage.getItem(DAILY_KEY) || 'null') || st; }catch(e){}
  return st;
}
function saveDailyState(st){

}
function daysBetween(a,b){
  var da = new Date(a); da.setHours(0,0,0,0);
  var db = new Date(b); db.setHours(0,0,0,0);
  return Math.round((db - da) / 86400000);
}
function canClaimDailyToday(){
  var st = getDailyState();
  if(!st.lastClaim) return true;
  return daysBetween(st.lastClaim, Date.now()) >= 1;
}
function renderDailyScreen(){
  var st = getDailyState();
  var gap = st.lastClaim ? daysBetween(st.lastClaim, Date.now()) : null;
  var canClaim = canClaimDailyToday();
  var currentStreak = st.streak || 0;
  if(gap !== null && gap >= 2) currentStreak = 0; // streak broken

  // Index (0-based) of the day just claimed (or about to be claimed) in the 7-day cycle.
  var cycleIndex = canClaim ? (currentStreak % 7) : ((currentStreak - 1 + 7) % 7);

  dailyRow.innerHTML = '';
  for(var i=0;i<7;i++){
    var done = canClaim ? (i < cycleIndex) : (i <= cycleIndex);
    var isToday = canClaim ? (i === cycleIndex) : false;
    var day = document.createElement('div');
    day.className = 'daily-day' + (done ? ' done' : '') + (isToday ? ' today' : '');
    day.innerHTML = '<div class="dn">Day '+(i+1)+'</div><div class="dv">'+DAILY_REWARDS[i]+'</div>';
    dailyRow.appendChild(day);
  }
  dailyAmount.textContent = '+' + DAILY_REWARDS[cycleIndex];
  dailyStreakLabel.textContent = canClaim ? ('day ' + (cycleIndex+1) + ' streak') : 'come back tomorrow';

  dailyClaimBtn.textContent = canClaim ? 'Claim' : 'Claimed Today';
}

function claimDaily(){
  if(!canClaimDailyToday()) return;
  var st = getDailyState();
  var gap = st.lastClaim ? daysBetween(st.lastClaim, Date.now()) : null;
  var newStreak;
  if(gap === null || gap >= 2){
    newStreak = 1;
  } else {
    newStreak = (st.streak || 0) + 1;

  st.streak = newStreak;

   INPUT

function getPointer(e){
  var rect = canvas.getBoundingClientRect();
  if(e.touches && e.touches.length){
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onPointerDown(e){
  if(gameState !== STATE_PLAY) return;
  e.preventDefault();
  var p = getPointer(e);
  aiming = true;
  var ap = archerPos();
  aimStart = { x: ap.x, y: ap.y - 30 }; // match the arrow's actual launch height
  aimCurrent = p;
}
function onPointerMove(e){
  if(!aiming) return;
  e.preventDefault();
  aimCurrent = getPointer(e);
}
function onPointerUp(e){
  if(!aiming) return;
  e.preventDefault();
  fireArrow();
  aiming = false;
  powerFill.style.width = '0%';
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);

canvas.addEventListener('touchstart', onPointerDown, {passive:false});
canvas.addEventListener('touchmove', onPointerMove, {passive:false});
canvas.addEventListener('touchend', onPointerUp, {passive:false});
canvas.addEventListener('touchcancel', onPointerUp, {passive:false});

/* ============================================================
   ENTITIES: ARROW
   ============================================================ */
function Arrow(x,y,angle,power){
  var speed = 6.2 + power * 13.5;
  this.x = x; this.y = y;
  this.vx = Math.cos(angle) * speed;
  this.vy = Math.sin(angle) * speed;
  this.gravity = 26;
  this.dead = false;
  this.trail = [];
  this.stuck = false;
  this.stuckAngle = 0;
  this.stuckTimer = 0;
  this.life = 0;
}
Arrow.prototype.update = function(dt){
  this.life += dt;
  if(this.stuck){
    this.stuckTimer -= dt;
    if(this.stuckTimer <= 0) this.dead = true;
    return;
  }
  this.trail.push({x:this.x, y:this.y});
  if(this.trail.length > 10) this.trail.shift();
  this.vy += this.gravity * dt;
  this.x += this.vx * dt * 60;
  this.y += this.vy * dt * 60;
  if(this.y >= groundY - 4){
    this.y = groundY - 4;
    this.stuck = true;
    this.stuckAngle = Math.atan2(this.vy, this.vx);
    this.stuckTimer = 2.0 + Math.random() * 1.0;
    return;
  }
  if(this.x > W + 50 || this.x < -50) this.dead = true;
};
Arrow.prototype.angle = function(){
  if(this.stuck) return this.stuckAngle;
  return Math.atan2(this.vy, this.vx);
};

/* ============================================================
   ENTITIES: ENEMY ARROW (fired by ranged raiders at the archer)
   ============================================================ */
var enemyArrows = [];
function fireEnemyArrow(en){
  var ap = archerPos();
  var targetX = ap.x + (Math.random()-0.5) * 18;
  var targetY = ap.y - 30 + (Math.random()-0.5) * 14;
  var sx = en.x - en.r - 4, sy = en.y - en.r * 1.1;
  var dx = targetX - sx, dy = targetY - sy;
  var dist = Math.sqrt(dx*dx + dy*dy) || 1;
  var speed = 7.4;
  enemyArrows.push({
    x:sx, y:sy,
    vx: dx/dist*speed, vy: dy/dist*speed,
    gravity: 13,
    trail: [],
    dead: false,
    life: 0
  });
  playEnemyShoot();
}
function updateEnemyArrows(dt){
  for(var i=enemyArrows.length-1;i>=0;i--){
    var a = enemyArrows[i];
    a.life += dt;
    a.trail.push({x:a.x,y:a.y});
    if(a.trail.length > 8) a.trail.shift();
    a.vy += a.gravity*dt;
    a.x += a.vx*dt*60;
    a.y += a.vy*dt*60;
    if(a.life > 3.5 || a.x < -60 || a.y > H+60){ a.dead = true; }

    if(!a.dead && gameState === STATE_PLAY){
      var ap = archerPos();
      var ddx = a.x - ap.x, ddy = a.y - (ap.y - 26);
      if(Math.sqrt(ddx*ddx+ddy*ddy) < 22){
        a.dead = true;
        archerHitByArrow();
      }
    }
    if(a.dead) enemyArrows.splice(i,1);
  }
}
function drawEnemyArrows(){
  for(var i=0;i<enemyArrows.length;i++){
    var a = enemyArrows[i];
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for(var t=0;t<a.trail.length;t++){
      var pt = a.trail[t];
      var frac = t/a.trail.length;
      ctx.globalAlpha = frac * 0.5;
      var tg = ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,3);
      tg.addColorStop(0,'rgba(180,200,255,0.9)');
      tg.addColorStop(1,'rgba(120,140,255,0)');
      ctx.fillStyle = tg;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;

    var ang = Math.atan2(a.vy, a.vx);
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(ang);
    ctx.strokeStyle = '#445';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(7,0); ctx.stroke();
    ctx.fillStyle = '#cfd8ff';
    ctx.beginPath(); ctx.moveTo(7,0); ctx.lineTo(2,-3); ctx.lineTo(2,3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8899cc';
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-8,-3); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-8,3); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

/* ============================================================
   ENTITIES: ENEMY (raider walking toward the gate at x=0)
   ============================================================ */
var ENEMY_TYPES = {
  grunt:    { speed: 36, hp: 1, r: 16, color1:'#9a5a3a', color2:'#6e3c24', score: 10 },
  runner:   { speed: 64, hp: 1, r: 13, color1:'#3a7a5a', color2:'#245a38', score: 15 },
  brute:    { speed: 24, hp: 3, r: 21, color1:'#7a3a6a', color2:'#4a2450', score: 30 },
  shielded: { speed: 26, hp: 2, r: 18, color1:'#5a5a6a', color2:'#33333e', score: 25, shield:true },
  zigzag:   { speed: 46, hp: 1, r: 14, color1:'#b08a2e', color2:'#7a5c18', score: 20, zigzag:true },
  archer:   { speed: 22, hp: 1, r: 15, color1:'#3a3a5a', color2:'#22223a', score: 25, ranged:true, stopRange: 0.42 }
};

function Enemy(type, startX){
  var def = ENEMY_TYPES[type];
  this.type = type;
  this.def = def;
  this.x = startX;
  this.y = groundY;
  this.hp = def.hp;
  this.maxHp = def.hp;
  this.r = def.r;
  this.dead = false;
  this.reachedGate = false;
  this.walkPhase = Math.random() * Math.PI * 2;
  this.hitFlash = 0;
  this.headFlash = 0;
  this.deathTimer = 0;
  this.dying = false;
  // Head hitzone: a smaller circle near the top of the body sprite.
  // offsetY is relative to the body's local origin (0,0) before bob is applied.
  this.headOffsetY = -this.r * 0.62;
  this.headR = this.r * 0.42;
  // Death animation: topple direction + spin, decided once on death.
  this.fallDir = 1;
  this.fallSpin = 0;
  // Shield: blocks non-headshot hits from the front until broken.
  this.shieldHp = def.shield ? 2 : 0;
  this.shieldFlash = 0;
  // Zigzag: lateral weave while advancing.
  this.zigPhase = Math.random() * Math.PI * 2;
  this.baseY = groundY;
  // Ranged: stops at a distance and fires arrows at the archer.
  this.fireTimer = 1.0 + Math.random()*1.2;
  this.stopped = false;
}
Enemy.prototype.update = function(dt){
  if(this.dying){
    this.deathTimer += dt;
    if(this.deathTimer > 0.5) this.dead = true;
    return;
  }
  if(this.shieldFlash > 0) this.shieldFlash -= dt;

  if(this.def.ranged){
    var stopX = W * this.def.stopRange;
    if(this.x > stopX){
      this.x -= this.def.speed * dt;
      this.walkPhase += dt * (this.def.speed / 7.5);
      this.stopped = false;
    } else {
      this.stopped = true;
      this.walkPhase += dt * 2.2; // idle fidget while shooting
      this.fireTimer -= dt;
      if(this.fireTimer <= 0){
        this.fireTimer = 1.7 + Math.random()*1.1;
        fireEnemyArrow(this);
      }
    }
  } else {
    this.x -= this.def.speed * dt;
    this.walkPhase += dt * (this.def.speed / 7.5);
    if(this.def.zigzag){
      this.zigPhase += dt * 5.5;
      this.y = this.baseY + Math.sin(this.zigPhase) * 26;
    }
  }

  if(this.hitFlash > 0) this.hitFlash -= dt;
  if(this.headFlash > 0) this.headFlash -= dt;
  if(this.x <= W * 0.075){
    this.reachedGate = true;
    this.dead = true;
  }
};
Enemy.prototype.hit = function(dmg, isHeadshot, fromAngle){
  // Shielded enemies block body shots from the front (shield faces the archer / right side).
  if(this.shieldHp > 0 && !isHeadshot){
    this.shieldHp--;
    this.shieldFlash = 0.2;
    playShieldBlock();
    return false; // blocked, no kill
  }
  this.hp -= dmg;
  if(isHeadshot){ this.headFlash = 0.18; }
  else { this.hitFlash = 0.15; }
  if(this.hp <= 0 && !this.dying){
    this.dying = true;
    this.fallDir = Math.random() < 0.5 ? -1 : 1;
    this.fallSpin = (0.6 + Math.random()*0.5) * this.fallDir;
    return true; // killed
  }
  return false;
};

/* ============================================================
   BLOOD SYSTEM
   ============================================================ */
var bloodDrops = [];
var bloodSplats = [];

function spawnBlood(x, y, arrowAngle, isHeadshot){
  var count = isHeadshot ? 20 : 9;
  var colors = ['#cc0020','#990018','#dd1133','#880011','#ee2244'];
  for(var i = 0; i < count; i++){
    var baseAng = arrowAngle + Math.PI + (Math.random()-0.5)*2.0;
    var spd = 55 + Math.random()*(isHeadshot ? 210 : 130);
    bloodDrops.push({
      x:x, y:y,
      vx:Math.cos(baseAng)*spd, vy:Math.sin(baseAng)*spd-(25+Math.random()*55),
      life:0.3+Math.random()*0.5, age:0,
      size:1.5+Math.random()*(isHeadshot?5:3),
      color:colors[Math.floor(Math.random()*colors.length)],
      trail:[]
    });
  }
  // slow drips
  var drips = isHeadshot ? 5 : 2;
  for(var d = 0; d < drips; d++){
    bloodDrops.push({
      x:x+(Math.random()-0.5)*16, y:y,
      vx:(Math.random()-0.5)*25, vy:-15-Math.random()*35,
      life:0.55+Math.random()*0.45, age:0,
      size:2+Math.random()*2.5, color:'#aa0015', trail:[]
    });
  }
  // immediate impact splat
  bloodSplats.push({ x:x, y:y, r:(isHeadshot?13:6)+Math.random()*5, life:isHeadshot?2.5:1.6, age:0, onGround:false });
}

function updateBlood(dt){
  for(var i = bloodDrops.length-1; i >= 0; i--){
    var d = bloodDrops[i];
    d.age += dt;
    if(d.age >= d.life){ bloodDrops.splice(i,1); continue; }
    if(!d.trail.length || Math.hypot(d.x-d.trail[d.trail.length-1].x, d.y-d.trail[d.trail.length-1].y) > 4){
      d.trail.push({x:d.x, y:d.y});
      if(d.trail.length > 5) d.trail.shift();
    }
    d.vy += 300*dt;
    d.vx *= 0.985;
    d.x += d.vx*dt;
    d.y += d.vy*dt;
    if(d.y >= groundY-2){
      bloodSplats.push({ x:d.x+(Math.random()-0.5)*5, y:groundY-1, r:d.size*(1.1+Math.random()*1.3),
        life:2.2+Math.random()*1.4, age:0, onGround:true });
      bloodDrops.splice(i,1);
    }
  }
  for(var j = bloodSplats.length-1; j >= 0; j--){
    bloodSplats[j].age += dt;
    if(bloodSplats[j].age >= bloodSplats[j].life) bloodSplats.splice(j,1);
  }
}

function drawBlood(){
  ctx.save();
  // Ground splats
  for(var j = 0; j < bloodSplats.length; j++){
    var sp = bloodSplats[j];
    var fa = Math.max(0, 1-sp.age/sp.life) * (sp.onGround ? 0.72 : 0.5);
    if(fa<=0) continue;
    ctx.globalAlpha = fa;
    var ry = sp.onGround ? sp.r*0.27 : sp.r*0.7;
    ctx.fillStyle = '#7a000e';
    ctx.beginPath(); ctx.ellipse(sp.x,sp.y,sp.r,ry,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = fa*0.55;
    ctx.fillStyle = '#bb1020';
    ctx.beginPath(); ctx.ellipse(sp.x,sp.y,sp.r*0.42,ry*0.42,0,0,Math.PI*2); ctx.fill();
  }
  // Flying drops + trails
  for(var i = 0; i < bloodDrops.length; i++){
    var d = bloodDrops[i];
    var frac = 1-d.age/d.life;
    if(frac<=0) continue;
    if(d.trail.length > 1){
      ctx.globalAlpha = frac*0.4;
      ctx.strokeStyle = '#7a000e';
      ctx.lineWidth = d.size*0.55;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(d.trail[0].x, d.trail[0].y);
      for(var t=1;t<d.trail.length;t++) ctx.lineTo(d.trail[t].x, d.trail[t].y);
      ctx.lineTo(d.x, d.y);
      ctx.stroke();
    }
    ctx.globalAlpha = frac*0.85;
    ctx.fillStyle = d.color;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.size*frac,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ============================================================
   PARTICLES (impact bits)
   ============================================================ */
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var ang = Math.random()*Math.PI*2;
    var spd = 40 + Math.random()*90;
    particles.push({
      x:x, y:y,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd - 40,
      life: 0.5 + Math.random()*0.3,
      age: 0,
      color: color,
      size: 2 + Math.random()*3
    });
  }
}
function updateParticles(dt){
  for(var i=particles.length-1;i>=0;i--){
    var p = particles[i];
    p.age += dt;
    if(p.age >= p.life){ particles.splice(i,1); continue; }
    p.vy += 180*dt;
    p.x += p.vx*dt;
    p.y += p.vy*dt;
  }
}

/* ============================================================
   FIRING
   ============================================================ */
function fireArrow(){
  var dx = aimCurrent.x - aimStart.x;
  var dy = aimCurrent.y - aimStart.y;
  var dist = Math.sqrt(dx*dx + dy*dy);
  if(dist < 8) return; // too small a pull, ignore

  var clamped = Math.min(dist, MAX_PULL);
  var power = clamped / MAX_PULL; // 0..1
  // Point & shoot: arrow flies directly toward where the player dragged to,
  // launched from the same point the aim line is drawn from.
  var angle = Math.atan2(dy, dx);

  var a = new Arrow(aimStart.x + 14*Math.cos(angle), aimStart.y + 14*Math.sin(angle), angle, power);
  arrows.push(a);
  playBowShoot(power);

  archerRecoil = 0.5 + power*0.5; // harder pulls kick back harder
  archerRecoilAngle = angle;
}

/* ============================================================
   WAVE MANAGEMENT
   ============================================================ */
function startWave(n){
  // Evaluate the wave just cleared (n-1) before resetting per-wave tracking.
  if(n > 1){
    if(!runStats.livesLostThisWave) unlockAchievement('flawless');
  }
  runStats.livesLostThisWave = false;

  wave = n;
  updateWaveDOM();
  waveEnemiesToSpawn = 5 + Math.floor(n * 2.1);
  waveSpawnedCount = 0;
  spawnTimer = 0.5;
  spawnInterval = Math.max(0.32, 1.25 - n*0.052);
  waveActive = true;

  if(n >= 5) unlockAchievement('wave5');
  if(n >= 10) unlockAchievement('wave10');
  if(n >= 15) unlockAchievement('wave15');

  waveBannerBig.textContent = 'WAVE ' + n;
  waveBanner.classList.add('show');
  setTimeout(function(){ waveBanner.classList.remove('show'); }, 1600);
}

function pickEnemyType(n){
  var r = Math.random();
  // Higher waves stack more dangerous types and shrink the plain-grunt share.
  if(n >= 6 && r < 0.14) return 'archer';
  if(n >= 5 && r < 0.28) return 'shielded';
  if(n >= 3 && r < 0.46) return 'zigzag';
  if(n >= 4 && r < 0.62) return 'brute';
  if(n >= 2 && r < 0.82) return 'runner';
  return 'grunt';
}

function trySpawnEnemy(dt){
  if(!waveActive) return;
  if(waveSpawnedCount >= waveEnemiesToSpawn) {
    if(enemies.length === 0){
      waveActive = false;
      waveBreakTimer = 1.8;
    }
    return;
  }
  spawnTimer -= dt;
  if(spawnTimer <= 0){
    spawnTimer = spawnInterval;
    waveSpawnedCount++;
    var type = pickEnemyType(wave);
    enemies.push(new Enemy(type, W + 40 + Math.random()*60));
  }
}

/* ============================================================
   COLLISION
   ============================================================ */
function checkCollisions(){
  for(var i=arrows.length-1;i>=0;i--){
    var a = arrows[i];
    if(a.dead) continue;
    for(var j=enemies.length-1;j>=0;j--){
      var en = enemies[j];
      if(en.dying || en.dead) continue;

      var bodyCenterY = en.y - en.r;
      var headCenterY = bodyCenterY + en.headOffsetY;

      var hdx = a.x - en.x;
      var hdy = a.y - headCenterY;
      var headDist = Math.sqrt(hdx*hdx + hdy*hdy);

      var bdx = a.x - en.x;
      var bdy = a.y - bodyCenterY;
      var bodyDist = Math.sqrt(bdx*bdx + bdy*bdy);

      // Headshot zone is smaller and checked first so a precise shot
      // through the body circle's head region still counts as a headshot.
      var isHeadshot = headDist < en.headR + 3;
      var isBodyHit = !isHeadshot && bodyDist < en.r + 4;

      if(isHeadshot || isBodyHit){
        var dmg = isHeadshot ? 2 : 1;
        var blockedByShield = en.shieldHp > 0 && !isHeadshot;
        var killed = en.hit(dmg, isHeadshot, a.angle());
        a.dead = true;

        if(blockedByShield){
          // Blocked: spark particles, no blood, no kill, arrow stops here.
          spawnParticles(a.x, a.y, '#cfd8ff', 8);
          break;
        }

        var impactColor = isHeadshot ? '#ffe27a' : en.def.color1;
        spawnParticles(a.x, a.y, impactColor, killed ? 14 : (isHeadshot ? 10 : 6));
        spawnBlood(a.x, a.y, a.angle(), isHeadshot);
        playArrowHit(isHeadshot);
        if(killed){
          playEnemyDie();
          triggerShake(isHeadshot ? 5 : 2.5, 0.12);
        }

        if(isHeadshot){
          spawnComboPop(en.x, en.y - en.r - en.headR - 28, 'HEADSHOT', '#ffd34d');
          triggerSlowmo();
          runStats.headshots++;
          totalHeadshots++;
          try{ localStorage.setItem('archers_arrow_total_headshots', String(totalHeadshots)); }catch(e){}
          if(totalHeadshots >= 10) unlockAchievement('headhunter');
          if(totalHeadshots >= 50) unlockAchievement('headhunter2');
        }

        if(killed){
          var basePoints = en.def.score * (isHeadshot ? 2 : 1);
          score += basePoints * (1 + Math.floor(combo/5));
          updateScoreDOM();
          combo++;
          if(combo > comboMax) comboMax = combo;
          comboTimer = COMBO_WINDOW;
          updateComboDOM(true);
          if(combo >= 2) playComboUp();

          if(combo >= 3 && combo % 3 === 0){
            spawnComboPop(en.x, en.y - en.r - 20, combo + 'x COMBO', '#e8833a');
          }
          if(combo >= 5) unlockAchievement('combo5');
          if(combo >= 10) unlockAchievement('combo10');
          if(combo >= 20) unlockAchievement('combo20');
          if(combo === 1) unlockAchievement('first_blood');
          if(score >= 5000) unlockAchievement('score5000');
          if(score >= 20000) unlockAchievement('score20000');

          if(en.type === 'brute'){
            runStats.brutesKilled++;
            totalBrutes++;
            try{ localStorage.setItem('archers_arrow_total_brutes', String(totalBrutes)); }catch(e){}
            if(totalBrutes >= 25) unlockAchievement('brute_slayer');
          }
        }
        break;
      }
    }
  }
}

   SLOW MOTION (headshot hit-stop)

function triggerSlowmo(){
  slowmoTimer = SLOWMO_DURATION;

/* ============================================================
   LOSING LIVES
   ============================================================ */
function handleGateBreaches(){
  for(var i=enemies.length-1;i>=0;i--){
    if(enemies[i].reachedGate){
      lives--;
      runStats.livesLostThisWave = true;
      combo = 0; comboTimer = 0; updateComboDOM(false);
      renderHearts();
      flashDamage();
      playLifeLost();
      triggerShake(9, 0.32);
      if(lives <= 0){
        endGame();
        return;
      }
    }
  }
}

var damageFlash = 0;
function flashDamage(){ damageFlash = 0.35; }

/* Archer struck by an enemy arrow: lose a life, same feedback as a gate breach. */
var archerHitCooldown = 0;
function archerHitByArrow(){
  if(archerHitCooldown > 0) return; // brief i-frames so multiple arrows in one frame don't double-hit
  archerHitCooldown = 0.4;
  lives--;
  runStats.livesLostThisWave = true;
  combo = 0; comboTimer = 0; updateComboDOM(false);
  renderHearts();
  flashDamage();
  playLifeLost();
  triggerShake(7, 0.28);
  spawnParticles(archerPos().x, archerPos().y - 30, '#ff5a5a', 10);
  if(lives <= 0) endGame();
}

/* ============================================================
   AUDIO (Web Audio API - procedural, no assets)
   ============================================================ */
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx = new AudioCtx(); }catch(e){} }
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBowShoot(power){
  var ac = getAudioCtx(); if(!ac) return;
  // Woody twang: short noise burst + sine decay
  var buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
  var data = buf.getChannelData(0);
  for(var i=0;i<data.length;i++){
    var t = i/ac.sampleRate;
    data[i] = (Math.random()*2-1) * Math.exp(-t*55) * 0.6
            + Math.sin(2*Math.PI*180*t) * Math.exp(-t*28) * 0.5;
  }
  var src = ac.createBufferSource();
  src.buffer = buf;
  var gain = ac.createGain();
  gain.gain.setValueAtTime(0.55 + power*0.35, ac.currentTime);
  src.connect(gain); gain.connect(ac.destination);
  src.start();
}

function playArrowHit(isHeadshot){
  var ac = getAudioCtx(); if(!ac) return;
  var dur = 0.18;
  var buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
  var data = buf.getChannelData(0);
  for(var i=0;i<data.length;i++){
    var t = i/ac.sampleRate;
    var freq = isHeadshot ? 320 : 180;
    data[i] = (Math.random()*2-1)*Math.exp(-t*38)*0.7
            + Math.sin(2*Math.PI*freq*t)*Math.exp(-t*22)*0.4;
  }
  var src = ac.createBufferSource();
  src.buffer = buf;
  var gain = ac.createGain();
  gain.gain.setValueAtTime(isHeadshot ? 0.8 : 0.5, ac.currentTime);
  src.connect(gain); gain.connect(ac.destination);
  src.start();
}

function playEnemyDie(){
  var ac = getAudioCtx(); if(!ac) return;
  var osc = ac.createOscillator();
  var gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ac.currentTime+0.18);
  gain.gain.setValueAtTime(0.25, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.18);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime+0.18);
}

function playLifeLost(){
  var ac = getAudioCtx(); if(!ac) return;
  var osc = ac.createOscillator();
  var gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime+0.55);
  gain.gain.setValueAtTime(0.4, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.55);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime+0.55);
}

function playComboUp(){
  var ac = getAudioCtx(); if(!ac) return;
  var osc = ac.createOscillator();
  var gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(900, ac.currentTime+0.08);
  gain.gain.setValueAtTime(0.18, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.12);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime+0.12);
}

function playEnemyShoot(){
  var ac = getAudioCtx(); if(!ac) return;
  var buf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
  var data = buf.getChannelData(0);
  for(var i=0;i<data.length;i++){
    var t = i/ac.sampleRate;
    data[i] = (Math.random()*2-1) * Math.exp(-t*60) * 0.4
            + Math.sin(2*Math.PI*240*t) * Math.exp(-t*30) * 0.3;
  }
  var src = ac.createBufferSource();
  src.buffer = buf;
  var gain = ac.createGain();
  gain.gain.setValueAtTime(0.32, ac.currentTime);
  src.connect(gain); gain.connect(ac.destination);
  src.start();
}

function playShieldBlock(){
  var ac = getAudioCtx(); if(!ac) return;
  var osc = ac.createOscillator();
  var gain = ac.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(140, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(90, ac.currentTime+0.1);
  gain.gain.setValueAtTime(0.22, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.14);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime+0.14);
}

function resetGame(){
  score = 0; lives = maxLives; wave = 0; combo = 0; comboTimer = 0; comboMax = 0;
  arrows = []; enemies = []; particles = []; bloodDrops = []; bloodSplats = []; enemyArrows = [];
  archerHitCooldown = 0;
  runStats = { headshots:0, brutesKilled:0, livesLostThisWave:false };
  timeScale = 1; slowmoTimer = 0;
  updateScoreDOM(); renderHearts(); updateComboDOM(false);
  startWave(1);
}

function startGame(){
  resetGame();
  gameState = STATE_PLAY;
  startScreen.classList.add('hidden');
  overScreen.classList.add('hidden');
  pauseScreen.classList.add('hidden');
}

function endGame(){
  gameState = STATE_OVER;
  finalScore.textContent = score;
  finalWave.textContent = wave;
  finalCombo.textContent = comboMax;
  if(score > bestScore){
    bestScore = score;
    try{ localStorage.setItem(BEST_KEY, String(bestScore)); }catch(e){}
    bestTag.textContent = 'NEW BEST!';
  } else {
    bestTag.textContent = 'BEST: ' + bestScore;
  }
  // Populate name input with saved name
  if(nameInput) nameInput.value = playerName;
  var saved = saveScoreToLeaderboard(score, wave, comboMax);
  lastRunEntry = saved.entry;
  overScreen.classList.remove('hidden');
}

function pauseGame(){
  if(gameState !== STATE_PLAY) return;
  gameState = STATE_PAUSE;
  pauseScreen.classList.remove('hidden');
}
function resumeGame(){
  if(gameState !== STATE_PAUSE) return;
  gameState = STATE_PLAY;
  pauseScreen.classList.add('hidden');
  lastTime = performance.now();
}

/* ============================================================
   BACKGROUND (sunset battlefield: parallax mountains, drifting embers)
   ============================================================ */
var embers = [];      // slow drifting atmospheric motes
var birds = [];        // distant silhouette birds for life/depth
function buildStars(){
  embers = [];
  var count = Math.floor((W*H) / 13000);
  for(var i=0;i<count;i++){
    embers.push({
      x: Math.random()*W,
      y: groundY*0.2 + Math.random()*groundY*0.8,
      r: Math.random()*1.8 + 0.4,
      speed: 6 + Math.random()*14,
      drift: (Math.random()-0.5) * 10,
      tw: Math.random()*Math.PI*2,
      depth: 0.3 + Math.random()*0.7
    });
  }
  birds = [];
  var bc = 2 + Math.floor(Math.random()*3);
  for(var j=0;j<bc;j++){
    birds.push({
      x: Math.random()*W,
      y: groundY*0.18 + Math.random()*groundY*0.22,
      speed: 10 + Math.random()*8,
      phase: Math.random()*Math.PI*2,
      scale: 0.6 + Math.random()*0.6
    });
  }
}

function drawBackground(t){
  var tt = t*0.001;

  // ---- sky gradient: deep violet -> rose -> molten orange ----
  var g = ctx.createLinearGradient(0,0,0,groundY);
  g.addColorStop(0,   '#1b1033');
  g.addColorStop(0.32,'#3c1d44');
  g.addColorStop(0.58,'#7a2e4a');
  g.addColorStop(0.78,'#c8472f');
  g.addColorStop(1,   '#f2914a');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,groundY+2);

  // ---- sun: low, huge, glowing, slightly pulsing haze ----
  var sx = W*0.74, sy = groundY*0.62;
  var pulse = 0.9 + 0.1*Math.sin(tt*0.6);
  var sr = Math.min(W,H)*0.16*pulse;
  var halo = ctx.createRadialGradient(sx,sy,0,sx,sy,sr*3.4);
  halo.addColorStop(0,   'rgba(255,214,120,0.55)');
  halo.addColorStop(0.35,'rgba(255,150,70,0.28)');
  halo.addColorStop(1,   'rgba(255,150,70,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(sx,sy,sr*3.4,0,Math.PI*2); ctx.fill();

  var core = ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
  core.addColorStop(0,'#fff3d2');
  core.addColorStop(0.6,'#ffd56b');
  core.addColorStop(1,'#ff9d4d');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();

  // thin cloud bands drifting across the sun for depth
  ctx.save();
  ctx.globalAlpha = 0.16;
  ctx.fillStyle = '#2a1430';
  for(var c=0;c<3;c++){
    var cy = sy - sr*0.5 + c*sr*0.5 + Math.sin(tt*0.15 + c)*6;
    var cw = W*1.4;
    var cx = ((tt*8 + c*220) % (W+400)) - 300;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw*0.4, 7+c*2, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // distant bird silhouettes
  ctx.fillStyle = 'rgba(30,14,24,0.55)';
  for(var b=0;b<birds.length;b++){
    var bd = birds[b];
    bd.x += bd.speed * (1/60);
    if(bd.x > W+30){ bd.x = -30; bd.y = groundY*0.18 + Math.random()*groundY*0.22; }
    var flap = Math.sin(tt*6 + bd.phase) * 4 * bd.scale;
    ctx.save();
    ctx.translate(bd.x, bd.y);
    ctx.scale(bd.scale, bd.scale);
    ctx.beginPath();
    ctx.moveTo(-8,0); ctx.quadraticCurveTo(-3,-6-flap,0,0);
    ctx.quadraticCurveTo(3,-6-flap,8,0);
    ctx.quadraticCurveTo(3,1,0,2);
    ctx.quadraticCurveTo(-3,1,-8,0);
    ctx.fill();
    ctx.restore();
  }

  // ---- parallax mountain layers (slow horizontal drift via time) ----
  drawMountainLayer(groundY*0.78, 64, 0.55, tt*2,  'rgba(58,24,56,0.55)', true);
  drawMountainLayer(groundY*0.86, 46, 0.8,  tt*5,  '#3a2042');
  drawMountainLayer(groundY*0.93, 30, 1.15, tt*9,  '#5c2a3e');
  drawMountainLayer(groundY*0.985,18, 1.6,  tt*14, '#2a1420');

  // ---- ground ----
  var gg = ctx.createLinearGradient(0,groundY,0,H);
  gg.addColorStop(0,'#4a2418');
  gg.addColorStop(0.4,'#2a160e');
  gg.addColorStop(1,'#0c0805');
  ctx.fillStyle = gg;
  ctx.fillRect(0,groundY,W,H-groundY);

  // warm rim-light where sun hits the ground horizon
  var rim = ctx.createLinearGradient(0,groundY-2,0,groundY+30);
  rim.addColorStop(0,'rgba(255,160,80,0.35)');
  rim.addColorStop(1,'rgba(255,160,80,0)');
  ctx.fillStyle = rim;
  ctx.fillRect(0,groundY-2,W,32);

  ctx.strokeStyle = 'rgba(255,194,77,0.22)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();

  // ---- drifting embers / dust motes, parallax by depth ----
  for(var i=0;i<embers.length;i++){
    var s = embers[i];
    s.y -= s.speed * (1/60);
    s.x += s.drift * (1/60);
    if(s.y < groundY*0.05){ s.y = groundY*0.95; s.x = Math.random()*W; }
    var flick = 0.4 + 0.6*Math.sin(tt*2 + s.tw);
    ctx.globalAlpha = (0.15 + flick*0.4) * s.depth;
    ctx.fillStyle = s.depth > 0.6 ? '#ffd56b' : '#ff9d4d';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  drawKeep(tt);
}

function drawMountainLayer(baseY, amp, freqMul, drift, color, isFar){
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, baseY);
  var step = 36;
  for(var x=0;x<=W;x+=step){
    var y = baseY - Math.sin((x*0.012*freqMul) + drift*0.05) * amp
                   - Math.sin((x*0.004*freqMul) + drift*0.02 + 1.7) * amp*0.6
                   - amp;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W, baseY);
  ctx.lineTo(W, H);
  ctx.closePath();
  if(isFar){
    // far ridge gets atmospheric haze blending toward the sky color
    var hg = ctx.createLinearGradient(0, baseY-amp*2, 0, baseY);
    hg.addColorStop(0, 'rgba(120,60,80,0.0)');
    hg.addColorStop(1, color);
    ctx.fillStyle = hg;
  } else {
    ctx.fillStyle = color;
  }
  ctx.fill();
}

function drawKeep(tt){
  // simple castle wall/gate at left edge, lit warm against the sunset
  var gx = W*0.075;
  var wallW = 46;
  var wallTop = groundY - 92;

  // wall silhouette with subtle warm gradient (rim-lit edge facing the sun)
  var wg = ctx.createLinearGradient(0, wallTop, gx+wallW*0.4, wallTop);
  wg.addColorStop(0, '#1d1410');
  wg.addColorStop(1, '#3a2a1e');
  ctx.fillStyle = wg;
  ctx.fillRect(0, wallTop, gx+wallW*0.4, groundY-wallTop);

  // battlements
  ctx.fillStyle = '#241810';
  for(var i=0;i<5;i++){
    ctx.fillRect(i*14, wallTop-12, 9, 12);
  }

  // gate arch
  ctx.fillStyle = '#100a06';
  ctx.beginPath();
  ctx.moveTo(gx-6, groundY);
  ctx.lineTo(gx-6, wallTop+46);
  ctx.quadraticCurveTo(gx+14, wallTop+18, gx+34, wallTop+46);
  ctx.lineTo(gx+34, groundY);
  ctx.closePath();
  ctx.fill();

  // torches flanking the gate with flickering glow
  var flick1 = 0.7 + 0.3*Math.sin((tt||0)*9);
  var flick2 = 0.7 + 0.3*Math.sin((tt||0)*9 + 1.4);
  drawTorch(gx-10, wallTop+44, flick1);
  drawTorch(gx+38, wallTop+44, flick2);

  // wall highlight catching the sunset glow
  ctx.strokeStyle = 'rgba(255,194,77,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(gx+wallW*0.4, wallTop);
  ctx.lineTo(gx+wallW*0.4, groundY);
  ctx.stroke();
}

function drawTorch(x,y,flick){
  ctx.save();
  ctx.translate(x,y);
  var glow = ctx.createRadialGradient(0,-6,0,0,-6,26*flick);
  glow.addColorStop(0,'rgba(255,180,80,0.55)');
  glow.addColorStop(1,'rgba(255,120,40,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0,-6,26*flick,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#241710';
  ctx.fillRect(-2,-4,4,16);
  ctx.fillStyle = '#ffd56b';
  ctx.beginPath();
  ctx.ellipse(0,-8,3*flick,6*flick,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ff7a3a';
  ctx.beginPath();
  ctx.ellipse(0,-7,1.6*flick,3.5*flick,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

/* ============================================================
   DRAW: ARCHER + AIM
   ============================================================ */
function drawArcher(){
  var pos = archerPos();
  var angle = -0.55;
  var drawAmt = 0;

  if(aiming){
    var dx = aimCurrent.x - aimStart.x;
    var dy = aimCurrent.y - aimStart.y;
    angle = Math.atan2(dy,dx);
    var dist = Math.min(Math.sqrt(dx*dx+dy*dy), MAX_PULL);
    drawAmt = dist / MAX_PULL;
  } else if(archerRecoil > 0){
    angle = archerRecoilAngle;
  }

  // idle breathing: gentle vertical sway + slight shoulder rotation when not aiming
  var idleBreath = Math.sin(idleClock * 1.8) * (aiming ? 0.4 : 1.6);
  var idleSway = Math.sin(idleClock * 1.3) * (aiming ? 0.01 : 0.035);

  // body lean: lean back into the shot proportional to draw strength,
  // and kick further back for an instant on release (recoil).
  var lean = -drawAmt * 0.12 - archerRecoil * 0.22;

  ctx.save();

  // dynamic ground shadow cast toward the gate (away from the low sun)
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#1a0a08';
  ctx.beginPath();
  ctx.ellipse(pos.x - 8, pos.y + 4, 20, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.translate(pos.x, pos.y - 30 + idleBreath*0.4);
  ctx.scale(-1, 1); // flip to face right (toward enemies)
  ctx.rotate(idleSway + lean);

  // back leg (slightly behind, braced)
  ctx.fillStyle = '#241a10';
  ctx.beginPath();
  ctx.moveTo(-5, 18);
  ctx.lineTo(-11, 38 - idleBreath*0.3);
  ctx.lineTo(-4, 38 - idleBreath*0.3);
  ctx.lineTo(2, 18);
  ctx.closePath();
  ctx.fill();
  // front leg (forward stance, braces against the recoil)
  ctx.fillStyle = '#2c2014';
  ctx.beginPath();
  ctx.moveTo(2, 18);
  ctx.lineTo(9 + archerRecoil*2, 38 + idleBreath*0.3);
  ctx.lineTo(16 + archerRecoil*2, 38 + idleBreath*0.3);
  ctx.lineTo(7, 18);
  ctx.closePath();
  ctx.fill();
  // boots
  ctx.fillStyle = '#1a120a';
  ctx.fillRect(-14, 37 - idleBreath*0.3, 11, 5);
  ctx.fillRect(8 + archerRecoil*2, 37 + idleBreath*0.3, 11, 5);

  // quiver on back (slightly behind the body)
  ctx.save();
  ctx.translate(-8, -2);
  ctx.rotate(0.15 + lean*0.3);
  ctx.fillStyle = '#3a2410';
  // rounded rect manually (roundRect not supported everywhere)
  var qx=-4, qy=-16, qw=9, qh=20, qr=3;
  ctx.beginPath();
  ctx.moveTo(qx+qr,qy); ctx.lineTo(qx+qw-qr,qy); ctx.arcTo(qx+qw,qy,qx+qw,qy+qr,qr);
  ctx.lineTo(qx+qw,qy+qh-qr); ctx.arcTo(qx+qw,qy+qh,qx+qw-qr,qy+qh,qr);
  ctx.lineTo(qx+qr,qy+qh); ctx.arcTo(qx,qy+qh,qx,qy+qh-qr,qr);
  ctx.lineTo(qx,qy+qr); ctx.arcTo(qx,qy,qx+qr,qy,qr);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#6b4422'; ctx.lineWidth = 1; ctx.stroke();
  // arrows peeking out
  ctx.strokeStyle = '#caa478'; ctx.lineWidth = 1.5;
  var quiverArrows = [[-2.5,-16],[ 0,-16],[2.5,-16]];
  for(var qi=0;qi<quiverArrows.length;qi++){
    ctx.beginPath();
    ctx.moveTo(quiverArrows[qi][0], quiverArrows[qi][1]);
    ctx.lineTo(quiverArrows[qi][0], quiverArrows[qi][1] - 10 - qi*2);
    ctx.stroke();
  }
  ctx.fillStyle = '#cc3333';
  ctx.beginPath(); ctx.moveTo(-2.5,-26); ctx.lineTo(-5,-22); ctx.lineTo(-2.5,-22); ctx.closePath(); ctx.fill();
  ctx.restore();

  // body
  ctx.fillStyle = '#2c2218';
  ctx.beginPath();
  ctx.ellipse(0, 10, 11, 22, 0, 0, Math.PI*2);
  ctx.fill();
  // warm rim-light along the sun-facing edge
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#ff9d4d';
  ctx.beginPath();
  ctx.ellipse(7, 10, 4, 20, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // head (bobs slightly with breathing, tilts a touch into the draw)
  ctx.save();
  ctx.translate(0, -16 + idleBreath*0.5);
  ctx.rotate(drawAmt*0.06);
  ctx.fillStyle = '#caa478';
  ctx.beginPath();
  ctx.arc(0, 0, 9, 0, Math.PI*2);
  ctx.fill();
  // hood
  ctx.fillStyle = '#3a2e1c';
  ctx.beginPath();
  ctx.arc(0, -2, 10, Math.PI*0.9, Math.PI*2.15);
  ctx.fill();
  ctx.restore();

  // bow + arrow (rotated toward aim) — angle negated because ctx is flipped horizontally
  ctx.save();
  ctx.rotate(-(angle - lean));
  var bowBend = 14 + drawAmt*8;
  ctx.strokeStyle = '#6b4a2c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(8, 0, 20, Math.PI*0.55, Math.PI*1.45);
  ctx.stroke();
  // string
  ctx.strokeStyle = 'rgba(232,213,168,0.7)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  var pull = 6 + drawAmt*16 + archerRecoil*4;
  ctx.moveTo(8 + Math.cos(Math.PI*0.55)*20, Math.sin(Math.PI*0.55)*20);
  ctx.lineTo(8 - pull, 0);
  ctx.lineTo(8 + Math.cos(Math.PI*1.45)*20, Math.sin(Math.PI*1.45)*20);
  ctx.stroke();

  // drawing arm (shoulder to hand on the string) — visibly pulls back with draw strength
  ctx.strokeStyle = '#caa478';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(2, -2);
  ctx.lineTo(8 - pull*0.85, -1);
  ctx.stroke();

  if(aiming){
    // nocked arrow
    ctx.strokeStyle = '#caa478';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(8-pull, 0);
    ctx.lineTo(8-pull-22, 0);
    ctx.stroke();
    ctx.fillStyle = '#d8d8d8';
    ctx.beginPath();
    ctx.moveTo(8-pull-22,0);
    ctx.lineTo(8-pull-16,-3);
    ctx.lineTo(8-pull-16,3);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  ctx.restore();

  // aim trajectory preview (dotted arc)
  if(aiming){
    drawTrajectoryPreview(pos, angle, drawAmt);
  }
}

function drawTrajectoryPreview(pos, angle, power){
  var speed = 6.2 + power * 13.5;
  var sx = pos.x + 14*Math.cos(angle);
  var sy = pos.y - 30 + 14*Math.sin(angle);
  var vx = Math.cos(angle)*speed;
  var vy = Math.sin(angle)*speed;
  var gravity = 26;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // direct simulation matching Arrow physics with dt=1/30 steps
  var px=sx, py=sy, pvx=vx, pvy=vy;
  var dt = 1/30;
  for(var s=0; s<26; s++){
    pvy += gravity*dt;
    px += pvx*dt*60;
    py += pvy*dt*60;
    if(py > groundY || px > W) break;
    if(s % 2 === 0){
      ctx.globalAlpha = Math.max(0, 1 - s/26) * 0.7;
      var dg = ctx.createRadialGradient(px,py,0,px,py,3.2);
      dg.addColorStop(0,'rgba(255,213,107,0.9)');
      dg.addColorStop(1,'rgba(255,213,107,0)');
      ctx.fillStyle = dg;
      ctx.beginPath();
      ctx.arc(px,py,3.2,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* ============================================================
   DRAW: ARROWS
   ============================================================ */
function drawArrows(){
  for(var i=0;i<arrows.length;i++){
    var a = arrows[i];

    // Fade out stuck arrows
    var alpha = 1;
    if(a.stuck){
      alpha = Math.min(1, a.stuckTimer / 0.6); // fade in last 0.6s
    }

    if(!a.stuck){
      // glowing trail (additive-style warm streak)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for(var t=0;t<a.trail.length;t++){
        var pt = a.trail[t];
        var frac = t/a.trail.length;
        ctx.globalAlpha = frac * 0.5;
        var tg = ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,3.2);
        tg.addColorStop(0,'rgba(255,210,140,0.9)');
        tg.addColorStop(1,'rgba(255,150,70,0)');
        ctx.fillStyle = tg;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 3.2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    var ang = a.angle();
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(a.x, a.y);
    ctx.rotate(ang);
    ctx.strokeStyle = '#caa478';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(8,0);
    ctx.stroke();
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.moveTo(8,0); ctx.lineTo(2,-3); ctx.lineTo(2,3);
    ctx.closePath(); ctx.fill();
    // fletching
    ctx.fillStyle = '#ff5a5a';
    ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(-9,-4); ctx.lineTo(-9,0); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(-9,4); ctx.lineTo(-9,0); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

/* ============================================================
   DRAW: ENEMIES
   ============================================================ */
function drawEnemies(){
  for(var i=0;i<enemies.length;i++){
    var en = enemies[i];
    var legSwing = Math.sin(en.walkPhase) * 0.55;
    var armSwing = Math.sin(en.walkPhase + Math.PI) * 0.45;
    var bob = en.dying ? 0 : Math.abs(Math.sin(en.walkPhase)) * 3;
    var alpha = en.dying ? Math.max(0, 1 - en.deathTimer/0.5) : 1;

    // ground shadow (shrinks/fades as the body falls during death)
    var shadowScale = en.dying ? Math.max(0.3, 1 - en.deathTimer*0.6) : 1;
    ctx.save();
    ctx.globalAlpha = alpha*0.4;
    ctx.fillStyle = '#1a0a08';
    ctx.beginPath();
    ctx.ellipse(en.x - en.r*0.5, en.y + 3, en.r*1.5*shadowScale, en.r*0.32*shadowScale, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(en.x, en.y - en.r + bob);

    if(en.dying){
      // topple over: rotate the whole body around its feet and sink down
      var fallProgress = Math.min(1, en.deathTimer / 0.5);
      ctx.rotate(en.fallSpin * fallProgress * 1.6);
      ctx.translate(0, fallProgress * en.r*0.7);
      ctx.scale(1 + fallProgress*0.15, 1 - fallProgress*0.25);
    }

    var legColor = shadeColor(en.def.color2, -18);

    // back leg (behind body, swings opposite phase)
    drawLimb(en.r*0.18*-1, en.r*0.85, -legSwing*0.8, en.r*0.85, en.r*0.16, legColor);
    // back arm
    drawLimb(en.r*0.5, -en.r*0.05, -armSwing, en.r*0.62, en.r*0.13, en.def.color2);

    // body
    ctx.fillStyle = en.hitFlash > 0 ? '#ffffff' : en.def.color1;
    ctx.beginPath();
    ctx.arc(0,0,en.r,0,Math.PI*2);
    ctx.fill();
    // warm rim-light catching the sunset from the right
    if(!(en.hitFlash > 0)){
      ctx.save();
      ctx.globalAlpha *= 0.5;
      ctx.fillStyle = '#ffb15a';
      ctx.beginPath();
      ctx.arc(en.r*0.55, en.r*0.1, en.r*0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = en.hitFlash > 0 ? '#ffdddd' : en.def.color2;
    ctx.beginPath();
    ctx.arc(-en.r*0.25,-en.r*0.25,en.r*0.55,0,Math.PI*2);
    ctx.fill();

    // front leg
    drawLimb(en.r*0.18, en.r*0.85, legSwing*0.8, en.r*0.85, en.r*0.17, en.def.color1);
    // front arm
    drawLimb(en.r*0.5, -en.r*0.05, armSwing, en.r*0.62, en.r*0.14, en.def.color1);

    // head (the headshot hitzone, drawn so its position is readable)
    ctx.fillStyle = en.headFlash > 0 ? '#fff3c4' : '#caa478';
    ctx.beginPath();
    ctx.arc(0, en.headOffsetY, en.headR, 0, Math.PI*2);
    ctx.fill();
    if(en.headFlash > 0){
      ctx.save();
      var hg = ctx.createRadialGradient(0, en.headOffsetY, 0, 0, en.headOffsetY, en.headR+10);
      hg.addColorStop(0,'rgba(255,211,77,0.6)');
      hg.addColorStop(1,'rgba(255,211,77,0)');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(0, en.headOffsetY, en.headR+10, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = 'rgba(255,211,77,0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, en.headOffsetY, en.headR + 3, 0, Math.PI*2);
      ctx.stroke();
    }

    // eyes (simple menace dots), facing left (toward gate)
    ctx.fillStyle = '#ffcc55';
    ctx.beginPath();
    ctx.arc(-en.headR*0.4, en.headOffsetY, 1.6, 0, Math.PI*2);
    ctx.fill();

    // shield: a wooden-and-iron panel covering the front (sun-facing/right) side
    if(en.def.shield && en.shieldHp > 0 && !en.dying){
      ctx.save();
      ctx.translate(en.r*0.62, en.r*0.05);
      ctx.fillStyle = en.shieldFlash > 0 ? '#dfe6ff' : '#7a6038';
      ctx.beginPath();
      ctx.ellipse(0, 0, en.r*0.34, en.r*0.78, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#2c2410';
      ctx.lineWidth = 1.6;
      ctx.stroke();
      ctx.fillStyle = '#bfa86a';
      ctx.beginPath(); ctx.arc(0,0,en.r*0.1,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // ranged archer: small bow held up, visibly drawn while stopped & about to fire
    if(en.def.ranged){
      ctx.save();
      ctx.translate(en.r*0.4, -en.r*0.1);
      var drawPull = en.stopped ? Math.max(0, 1 - (en.fireTimer/2.0)) : 0;
      ctx.strokeStyle = '#3a2e1c';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0,0, en.r*0.6, -1.0, 1.0);
      ctx.stroke();
      if(en.stopped){
        ctx.strokeStyle = 'rgba(200,210,255,0.8)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(Math.cos(-1.0)*en.r*0.6, Math.sin(-1.0)*en.r*0.6);
        ctx.lineTo(-drawPull*8, 0);
        ctx.lineTo(Math.cos(1.0)*en.r*0.6, Math.sin(1.0)*en.r*0.6);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.restore();

    // hp pips for multi-hp / shielded enemies
    if((en.def.hp > 1 || en.def.shield) && !en.dying){
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(en.x - 16, en.y - en.r - 14, 32, 5);
      ctx.fillStyle = '#ff5a5a';
      var hpFrac = en.def.shield ? (en.hp + en.shieldHp) / (en.maxHp + 2) : (en.hp/en.maxHp);
      ctx.fillRect(en.x - 15, en.y - en.r - 13, 30 * hpFrac, 3);
    }
  }
}

/* Draws a simple jointed limb (a stubby capsule) pivoting from (px,py) at angle, length len, thickness w. */
function drawLimb(px, py, angle, len, w, color){
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-w*0.5, 0);
  ctx.lineTo(-w*0.5, len);
  ctx.arc(0, len, w*0.5, Math.PI, 0);
  ctx.lineTo(w*0.5, 0);
  ctx.arc(0, 0, w*0.5, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* Lighten/darken a hex color by `amt` (-255..255). */
function shadeColor(hex, amt){
  var col = hex.replace('#','');
  if(col.length === 3) col = col.split('').map(function(c){ return c+c; }).join('');
  var r = Math.max(0, Math.min(255, parseInt(col.substr(0,2),16) + amt));
  var g = Math.max(0, Math.min(255, parseInt(col.substr(2,2),16) + amt));
  var b = Math.max(0, Math.min(255, parseInt(col.substr(4,2),16) + amt));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

/* ============================================================
   DRAW: PARTICLES
   ============================================================ */
function drawParticles(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for(var i=0;i<particles.length;i++){
    var p = particles[i];
    var a = 1 - p.age/p.life;
    if(a <= 0) continue;
    ctx.globalAlpha = a;
    var pg = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*1.8);
    pg.addColorStop(0, p.color);
    pg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*1.8,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* ============================================================
   MAIN LOOP
   ============================================================ */
function update(dt){
  idleClock += dt;
  if(archerRecoil > 0) archerRecoil = Math.max(0, archerRecoil - dt*3.2);

  if(aiming){
    var dx = aimCurrent.x - aimStart.x;
    var dy = aimCurrent.y - aimStart.y;
    var dist = Math.min(Math.sqrt(dx*dx+dy*dy), MAX_PULL);
    powerFill.style.width = (dist/MAX_PULL*100) + '%';
  }

  for(var i=arrows.length-1;i>=0;i--){
    arrows[i].update(dt);
    if(arrows[i].dead) arrows.splice(i,1);
  }
  for(var j=enemies.length-1;j>=0;j--){
    enemies[j].update(dt);
  }
  updateEnemyArrows(dt);
  if(archerHitCooldown > 0) archerHitCooldown -= dt;

  checkCollisions();
  handleGateBreaches();

  for(var k=enemies.length-1;k>=0;k--){
    if(enemies[k].dead) enemies.splice(k,1);
  }

  updateParticles(dt);
  updateBlood(dt);

  if(comboTimer > 0){
    comboTimer -= dt;
    comboBarFill.style.width = Math.max(0, comboTimer/COMBO_WINDOW * 100) + '%';
    if(comboTimer <= 0){ combo = 0; updateComboDOM(false); }
  }

  if(damageFlash > 0) damageFlash -= dt;
  if(shakeTimer > 0) shakeTimer -= dt;

  if(waveActive){
    trySpawnEnemy(dt);
  } else if(waveBreakTimer > 0){
    waveBreakTimer -= dt;
    if(waveBreakTimer <= 0){
      startWave(wave+1);
    }
  }
}

function render(t){
  // Apply screen shake via canvas transform
  var sx = 0, sy = 0;
  if(shakeTimer > 0){
    var mag = shakeMag * (shakeTimer / 0.32);
    sx = (Math.random()*2-1) * mag;
    sy = (Math.random()*2-1) * mag;
  }
  ctx.save();
  ctx.translate(sx, sy);

  drawBackground(t);
  drawBlood();
  drawEnemies();
  drawEnemyArrows();
  drawArrows();
  drawParticles();
  drawArcher();

  ctx.restore();

  if(damageFlash > 0){
    ctx.fillStyle = 'rgba(168,51,74,' + (damageFlash*0.6) + ')';
    ctx.fillRect(0,0,W,H);
  }

  // Permanent subtle vignette for depth
  var vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.28,W/2,H/2,Math.max(W,H)*0.72);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(8,3,12,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);

  // subtle cool vignette pulse during slow-motion for readability/feedback
  if(slowmoTimer > 0){
    ctx.save();
    ctx.globalAlpha = Math.min(1, slowmoTimer/SLOWMO_DURATION) * 0.18;
    var vg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.7);
    vg.addColorStop(0,'rgba(255,211,77,0)');
    vg.addColorStop(1,'rgba(20,8,16,0.85)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function loop(now){
  rafId = requestAnimationFrame(loop);
  if(!lastTime) lastTime = now;
  var realDt = (now - lastTime) / 1000;
  realDt = Math.min(realDt, 1/30); // clamp for tab-switch hiccups
  lastTime = now;

  if(gameState === STATE_PLAY){
    // slow-motion timer always ticks in real time so it reliably expires,
    // then eases timeScale back up to normal speed.
    if(slowmoTimer > 0){
      slowmoTimer -= realDt;
      if(slowmoTimer <= 0){ slowmoTimer = 0; timeScale = 1; }
    }
    var dt = realDt * (slowmoTimer > 0 ? SLOWMO_FACTOR : 1);
    update(dt);
  }
  render(now);
}

/* ============================================================
   INIT
   ============================================================ */
resize();
buildStars();
renderHearts();
window.addEventListener('resize', buildStars);
rafId = requestAnimationFrame(loop);

})();
</script>
